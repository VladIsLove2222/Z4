                     data-title="Гектор"

<script>
function initCarousel(carouselSel, popupId, imgId, titleId, textId) {
    const carousel = document.querySelector(carouselSel);
    if (!carousel) return;
    const inner = carousel.querySelector('.carousel-inner');
    const items = carousel.querySelectorAll('.carousel-item');
    const prevBtn = carousel.querySelector('.prev');
    const nextBtn = carousel.querySelector('.next');
    const popup = document.getElementById(popupId);
    const popupImg = document.getElementById(imgId);
    const popupTitle = document.getElementById(titleId);
    const popupText = document.getElementById(textId);
    const closeBtn = popup.querySelector('.close');

    let index = 0;
    const maxIndex = Math.max(items.length - 2, 0);

    function update(animated) {
        inner.style.transition = animated ? 'transform 0.6s ease' : 'none';
        inner.style.transform = `translateX(-${index * 39}%)`;
    }

    prevBtn.addEventListener('click', () => { if (index > 0) { index--; update(true); } });
    nextBtn.addEventListener('click', () => { if (index < maxIndex) { index++; update(true); } });

    items.forEach(item => {
        item.addEventListener('click', () => {
            popupImg.src = item.getAttribute('data-img') || '';
            popupTitle.textContent = item.getAttribute('data-title') || '';
            popupText.innerHTML = item.getAttribute('data-text') || '';
            popup.style.display = 'flex';
        });
    });

    closeBtn.addEventListener('click', () => popup.style.display = 'none');
    popup.addEventListener('click', e => { if (e.target === popup) popup.style.display = 'none'; });

    update(false);
}

document.addEventListener('DOMContentLoaded', () => {
    initCarousel('.carousel-boh',   'popup-boh',   'popup-boh-img',   'popup-boh-title',   'popup-boh-text');
    initCarousel('.carousel-fatum', 'popup-fatum', 'popup-fatum-img', 'popup-fatum-title', 'popup-fatum-text');

    // Scroll to section from index.html links
    const hash = window.location.hash;
    if (hash === '#boh' || hash === '#fatum') {
        const el = document.querySelector(hash);
        if (el) setTimeout(() => el.scrollIntoView({ behavior: 'smooth' }), 100);
    }
});
</script>
